openapi: 3.0.3
info:
  title: Training Jobs API
  version: 1.0.0
  description: |
    训练任务管理 API,基于 AWS SageMaker HyperPod SDK 封装。

    **核心功能**:
    - 创建训练任务 (DDP/FSDP/DeepSpeed)
    - 查询任务状态和训练指标
    - 管理训练生命周期 (暂停/恢复/取消)
    - 查询训练日志和检查点

    **对应 User Story**: US-001 训练任务管理

  contact:
    name: AI Training Platform Team
    email: ai-platform@example.com

servers:
  - url: https://api.ai-training-platform.example.com/v1
    description: 生产环境
  - url: http://localhost:8000/v1
    description: 开发环境

tags:
  - name: Training Jobs
    description: 训练任务管理
  - name: Training Logs
    description: 训练日志查询
  - name: Training Metrics
    description: 训练指标监控

security:
  - BearerAuth: []

paths:
  /training-jobs:
    get:
      tags:
        - Training Jobs
      summary: 查询训练任务列表
      description: |
        分页查询训练任务列表,支持按状态、所有者、时间范围筛选。

        **权限**: 普通用户只能查看自己的任务,管理员可查看所有任务。
      operationId: listTrainingJobs
      parameters:
        - name: page
          in: query
          description: 页码 (从 1 开始)
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: status
          in: query
          description: 任务状态筛选
          required: false
          schema:
            type: string
            enum:
              - submitted
              - running
              - paused
              - preempted
              - completed
              - failed
        - name: priority
          in: query
          description: 任务优先级筛选
          required: false
          schema:
            type: string
            enum:
              - high
              - medium
              - low
        - name: owner_id
          in: query
          description: 所有者用户ID (仅管理员可用)
          required: false
          schema:
            type: integer
        - name: submitted_after
          in: query
          description: 提交时间起始 (ISO 8601 格式)
          required: false
          schema:
            type: string
            format: date-time
        - name: submitted_before
          in: query
          description: 提交时间结束 (ISO 8601 格式)
          required: false
          schema:
            type: string
            format: date-time
        - name: sort_by
          in: query
          description: 排序字段
          required: false
          schema:
            type: string
            enum:
              - created_at
              - submitted_at
              - completed_at
            default: created_at
        - name: sort_order
          in: query
          description: 排序方向
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        '200':
          description: 成功返回训练任务列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrainingJobSummary'
                  total:
                    type: integer
                    description: 总记录数
                  page:
                    type: integer
                    description: 当前页码
                  page_size:
                    type: integer
                    description: 每页数量
                  total_pages:
                    type: integer
                    description: 总页数
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Training Jobs
      summary: 创建训练任务
      description: |
        创建新的训练任务并提交到 HyperPod 集群。

        **工作流**:
        1. 验证用户资源配额 (Kueue)
        2. 创建 HyperPodPytorchJob 资源
        3. 返回任务 ID 和初始状态

        **权限**: 需要 `training:create` 权限
      operationId: createTrainingJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTrainingJobRequest'
            examples:
              single_node_ddp:
                summary: 单节点多GPU DDP训练
                description: 在单个节点上使用8个A100 GPU进行数据并行训练
                value:
                  job_name: "llama3-8b-finetune-ddp"
                  display_name: "LLaMA 3 8B 微调 (DDP)"
                  description: "使用LoRA微调LLaMA 3 8B模型,单节点8卡DDP训练"
                  image_uri: "123456.dkr.ecr.us-west-2.amazonaws.com/pytorch:2.1-gpu"
                  instance_type: "ml.p4d.24xlarge"
                  node_count: 1
                  tasks_per_node: 8
                  entrypoint_command:
                    - "torchrun"
                    - "--nproc_per_node=8"
                    - "train.py"
                    - "--config=configs/llama3_lora.yaml"
                  environment_variables:
                    NCCL_DEBUG: "INFO"
                    CUDA_VISIBLE_DEVICES: "0,1,2,3,4,5,6,7"
                  dataset_id: 1001
                  data_mount_path: "/data"
                  checkpoint_mount_path: "/checkpoints"
                  checkpoint_interval: 10
                  hyperparameters:
                    learning_rate: 0.0001
                    weight_decay: 0.01
                    warmup_steps: 1000
                    lora_rank: 8
                    lora_alpha: 16
                  max_epochs: 100
                  batch_size: 4
                  learning_rate: 0.0001
                  distribution_strategy: "ddp"
                  priority: "medium"
                  mixed_precision: true
                  use_spot_instances: false

              multi_node_fsdp:
                summary: 多节点FSDP训练
                description: 使用16个节点128个GPU进行全分片数据并行训练大模型
                value:
                  job_name: "llama3-70b-pretrain-fsdp-20260103"
                  display_name: "LLaMA 3 70B 预训练 (FSDP)"
                  description: "使用FSDP训练LLaMA 3 70B模型,16节点128卡"
                  image_uri: "123456.dkr.ecr.us-west-2.amazonaws.com/pytorch:2.1-fsdp"
                  instance_type: "ml.p4d.24xlarge"
                  node_count: 16
                  tasks_per_node: 8
                  entrypoint_command:
                    - "torchrun"
                    - "--nproc_per_node=8"
                    - "--nnodes=16"
                    - "--rdzv_backend=c10d"
                    - "--rdzv_endpoint=$MASTER_ADDR:$MASTER_PORT"
                    - "train.py"
                    - "--config=configs/llama3_70b_fsdp.yaml"
                  environment_variables:
                    NCCL_DEBUG: "WARN"
                    NCCL_SOCKET_IFNAME: "eth0"
                    TORCH_DISTRIBUTED_DEBUG: "DETAIL"
                  dataset_id: 2001
                  data_mount_path: "/fsx/datasets/pile"
                  checkpoint_mount_path: "/fsx/checkpoints/llama3-70b"
                  checkpoint_interval: 5
                  hyperparameters:
                    learning_rate: 0.00015
                    weight_decay: 0.1
                    warmup_steps: 2000
                    gradient_accumulation_steps: 4
                    fsdp_sharding_strategy: "FULL_SHARD"
                    fsdp_cpu_offload: false
                  max_epochs: 200
                  batch_size: 2
                  learning_rate: 0.00015
                  distribution_strategy: "fsdp"
                  priority: "high"
                  mixed_precision: true
                  use_spot_instances: false

              deepspeed_zero3_spot:
                summary: DeepSpeed ZeRO-3大模型训练(Spot实例)
                description: 使用DeepSpeed ZeRO-3在Spot实例上训练超大模型,启用混合精度和CPU卸载
                value:
                  job_name: "gpt-neox-20b-deepspeed-spot"
                  display_name: "GPT-NeoX 20B 训练 (DeepSpeed ZeRO-3 + Spot)"
                  description: "使用DeepSpeed ZeRO-3训练GPT-NeoX 20B模型,启用Spot实例和CPU卸载优化内存"
                  image_uri: "123456.dkr.ecr.us-west-2.amazonaws.com/deepspeed:0.12-cuda11.8"
                  instance_type: "ml.p4d.24xlarge"
                  node_count: 8
                  tasks_per_node: 8
                  entrypoint_command:
                    - "deepspeed"
                    - "--num_gpus=8"
                    - "--num_nodes=8"
                    - "--hostfile=/opt/ml/input/config/hosts"
                    - "train.py"
                    - "--deepspeed_config=configs/ds_zero3_config.json"
                  environment_variables:
                    NCCL_DEBUG: "INFO"
                    CUDA_LAUNCH_BLOCKING: "0"
                  dataset_id: 3001
                  data_mount_path: "/data/openwebtext"
                  checkpoint_mount_path: "/checkpoints"
                  checkpoint_interval: 20
                  hyperparameters:
                    learning_rate: 0.0001
                    weight_decay: 0.01
                    warmup_steps: 500
                    gradient_accumulation_steps: 8
                    zero_stage: 3
                    offload_optimizer: true
                    offload_param: false
                  max_epochs: 50
                  batch_size: 1
                  learning_rate: 0.0001
                  distribution_strategy: "deepspeed"
                  priority: "low"
                  mixed_precision: true
                  use_spot_instances: true
      responses:
        '201':
          description: 训练任务创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingJobDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: 资源冲突 (例如: 任务名称已存在)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '507':
          description: 资源配额不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaExceededError'
        '500':
          $ref: '#/components/responses/InternalServerError'

