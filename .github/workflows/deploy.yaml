# CI/CD 部署流水线
# 完整流程: test → build → push image → update Git manifest → kubectl apply → DB migrate → verify
#
# 触发条件:
#   - main 分支 push (自动部署到 dev)
#   - release/* 分支 push (自动部署到 staging)
#   - 手动触发 (可选择环境)
#
# 依赖的 GitHub Secrets:
#   - AWS_ACCOUNT_ID: AWS 账号 ID
#   - AWS_REGION: AWS 区域 (默认 us-east-1)
#   - AWS_ROLE_ARN: GitHub Actions OIDC 角色 ARN
#   - ECR_REGISTRY: ECR 仓库地址
#
# 部署方式 (push-based):
#   流水线更新 Kustomize overlay 镜像标签并提交回 Git 后，
#   由 deploy 阶段用 `kubectl apply -k` 直接将清单同步到集群，
#   再执行 `alembic upgrade head` 应用数据库迁移，最后做 fail-fast 验证。
#   注意: 集群当前未部署 ArgoCD，部署不依赖 GitOps 拉取，由本流水线推送完成。

name: Deploy AI Training Platform

on:
  push:
    branches:
      - main
      - "release/*"
    paths:
      - "backend/**"
      - "frontend/**"
      - "infrastructure/k8s/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "部署目标环境"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      component:
        description: "部署组件"
        required: true
        type: choice
        options:
          - all
          - backend
          - frontend

# 并发控制: 同一环境只允许一个部署
concurrency:
  group: deploy-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'dev') || 'staging' }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION || 'us-east-1' }}.amazonaws.com

permissions:
  id-token: write
  contents: write
  pull-requests: read

jobs:
  # ============================================================
  # 1. 确定部署参数
  # ============================================================
  prepare:
    name: "准备部署参数"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.params.outputs.environment }}
      component: ${{ steps.params.outputs.component }}
      image_tag: ${{ steps.params.outputs.image_tag }}
      resource_prefix: ${{ steps.params.outputs.resource_prefix }}
    steps:
      - name: 确定部署参数
        id: params
        run: |
          # 确定环境
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
            COMPONENT="${{ github.event.inputs.component }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="dev"
            COMPONENT="all"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            ENV="staging"
            COMPONENT="all"
          else
            ENV="dev"
            COMPONENT="all"
          fi

          # 镜像标签: v{版本}.{构建号}
          IMAGE_TAG="v$(date +%Y%m%d).${GITHUB_RUN_NUMBER}"

          # 资源前缀
          RESOURCE_PREFIX="ai-platform-${ENV}"

          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"
          echo "component=${COMPONENT}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "resource_prefix=${RESOURCE_PREFIX}" >> "$GITHUB_OUTPUT"

          echo "## 部署参数" >> "$GITHUB_STEP_SUMMARY"
          echo "- 环境: ${ENV}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 组件: ${COMPONENT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像标签: ${IMAGE_TAG}" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # 2. 后端测试和构建
  # ============================================================
  backend-build:
    name: "后端: 测试 + 构建"
    needs: prepare
    if: needs.prepare.outputs.component == 'all' || needs.prepare.outputs.component == 'backend'
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
      RESOURCE_PREFIX: ${{ needs.prepare.outputs.resource_prefix }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 代码检查 (ruff)
        run: |
          cd backend
          ruff check .
          ruff format --check .

      - name: 类型检查 (mypy)
        run: |
          cd backend
          mypy src/ --ignore-missing-imports

      - name: 单元测试
        run: |
          cd backend
          pytest tests/unit/ -v --tb=short --junitxml=test-results.xml
        continue-on-error: false

      - name: 配置 AWS 凭证 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 登录 ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: 构建并推送镜像
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${RESOURCE_PREFIX}-backend:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" ./backend
          docker push "${IMAGE_URI}"
          echo "backend_image=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: 记录构建信息
        run: |
          echo "## 后端构建" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像: ${backend_image}" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # 3. 前端测试和构建
  # ============================================================
  frontend-build:
    name: "前端: 测试 + 构建"
    needs: prepare
    if: needs.prepare.outputs.component == 'all' || needs.prepare.outputs.component == 'frontend'
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
      RESOURCE_PREFIX: ${{ needs.prepare.outputs.resource_prefix }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        run: |
          cd frontend
          npm ci

      - name: 代码检查 (ESLint)
        run: |
          cd frontend
          npm run lint

      - name: 类型检查 (TypeScript)
        run: |
          cd frontend
          npm run type-check

      - name: 单元测试
        run: |
          cd frontend
          npm run test -- --reporter=verbose
        continue-on-error: false

      - name: 构建
        run: |
          cd frontend
          npm run build

      - name: 配置 AWS 凭证 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 登录 ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: 构建并推送镜像
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${RESOURCE_PREFIX}-frontend:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" ./frontend
          docker push "${IMAGE_URI}"
          echo "frontend_image=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: 记录构建信息
        run: |
          echo "## 前端构建" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像: ${frontend_image}" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # 4. 更新 Git Manifest (镜像标签提交回 Git，作为部署的单一事实源)
  # ============================================================
  update-manifests:
    name: "更新 K8s 清单"
    needs: [prepare, backend-build, frontend-build]
    if: |
      always() &&
      (needs.backend-build.result == 'success' || needs.backend-build.result == 'skipped') &&
      (needs.frontend-build.result == 'success' || needs.frontend-build.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ needs.prepare.outputs.environment }}
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
      RESOURCE_PREFIX: ${{ needs.prepare.outputs.resource_prefix }}
      COMPONENT: ${{ needs.prepare.outputs.component }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 更新后端镜像标签
        if: env.COMPONENT == 'all' || env.COMPONENT == 'backend'
        run: |
          OVERLAY_DIR="infrastructure/k8s/overlays/${ENVIRONMENT}"
          BACKEND_IMAGE="${ECR_REGISTRY}/${RESOURCE_PREFIX}-backend:${IMAGE_TAG}"

          # 使用 kustomize edit 更新镜像
          cd "${OVERLAY_DIR}"
          kustomize edit set image "*-backend*=${BACKEND_IMAGE}"

      - name: 更新前端镜像标签
        if: env.COMPONENT == 'all' || env.COMPONENT == 'frontend'
        run: |
          OVERLAY_DIR="infrastructure/k8s/overlays/${ENVIRONMENT}"
          FRONTEND_IMAGE="${ECR_REGISTRY}/${RESOURCE_PREFIX}-frontend:${IMAGE_TAG}"

          cd "${OVERLAY_DIR}"
          kustomize edit set image "*-frontend*=${FRONTEND_IMAGE}"

      - name: 提交并推送清单变更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add infrastructure/k8s/
          if git diff --staged --quiet; then
            echo "没有清单变更，跳过提交"
          else
            git commit -m "chore(k8s): 更新 ${ENVIRONMENT} 镜像标签到 ${IMAGE_TAG} [skip ci]

          组件: ${COMPONENT}
          触发: ${GITHUB_SHA:0:8}
          流水线: ${GITHUB_RUN_ID}"
            git push
          fi

      - name: 记录部署信息
        run: |
          echo "## 清单更新" >> "$GITHUB_STEP_SUMMARY"
          echo "- 环境: ${ENVIRONMENT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像标签: ${IMAGE_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 下一阶段将由 deploy 作业执行 kubectl apply 同步到集群" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # 5. 部署到集群 + 数据库迁移 + 验证 (push-based, fail-fast)
  # ============================================================
  deploy-and-verify:
    name: "部署到集群并验证"
    needs: [prepare, update-manifests]
    if: needs.update-manifests.result == 'success'
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ needs.prepare.outputs.environment }}
      NAMESPACE: ai-platform
    steps:
      # 检出最新 main —— 含 update-manifests 刚提交的镜像标签，作为部署单一事实源
      - name: 检出最新清单
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: 配置 AWS 凭证
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 更新 kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ai-platform-${ENVIRONMENT}-eks \
            --region ${{ env.AWS_REGION }}

      # 真正把清单同步到集群 (替代缺失的 ArgoCD 拉取)
      - name: 应用 K8s 清单 (kubectl apply -k)
        run: |
          OVERLAY_DIR="infrastructure/k8s/overlays/${ENVIRONMENT}"
          echo "应用 overlay: ${OVERLAY_DIR}"
          kubectl apply -k "${OVERLAY_DIR}"

      # 等待滚动完成 —— 失败即红 (fail-fast, 不再 continue-on-error)
      - name: 等待 Deployment 滚动完成
        run: |
          echo "等待 backend / frontend 滚动更新..."
          kubectl rollout status deployment/backend -n "${NAMESPACE}" --timeout=300s
          kubectl rollout status deployment/frontend -n "${NAMESPACE}" --timeout=300s

      # 应用数据库迁移 —— 治理迁移漂移 (复用已就绪的 backend 镜像, 保证代码与 schema 同版本)
      - name: 数据库迁移 (alembic upgrade head)
        run: |
          echo "在 backend pod 内执行 alembic upgrade head..."
          kubectl exec -n "${NAMESPACE}" deploy/backend -- alembic upgrade head

      - name: 验证集群状态
        run: |
          echo "--- Pod 状态 ---"
          kubectl get pods -n "${NAMESPACE}" -o wide
          echo "--- Service 状态 ---"
          kubectl get svc -n "${NAMESPACE}"

      # 真实健康检查 —— 失败即红
      - name: 健康检查 (fail-fast)
        run: |
          echo "调用 backend /health ..."
          kubectl exec -n "${NAMESPACE}" deploy/backend -- \
            python -c "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/health',timeout=10); sys.exit(0 if r.status==200 else 1)"
          echo "健康检查通过"

      - name: 部署总结
        if: always()
        run: |
          echo "## 部署验证" >> "$GITHUB_STEP_SUMMARY"
          echo "- 环境: ${ENVIRONMENT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像标签: ${{ needs.prepare.outputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 部署方式: kubectl apply -k + alembic upgrade (push-based)" >> "$GITHUB_STEP_SUMMARY"
          echo "- 结果: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # 6. 生产环境审批门控 (仅 prod)
  # ============================================================
  prod-approval:
    name: "生产环境审批"
    needs: prepare
    if: needs.prepare.outputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 审批确认
        run: |
          echo "生产环境部署已获批准"
          echo "审批者: ${{ github.actor }}"
          echo "时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
