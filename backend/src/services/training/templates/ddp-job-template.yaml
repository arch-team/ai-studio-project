# PyTorch DDP (DistributedDataParallel) 训练模板
# 适用场景: 中小模型(≤13B参数),多GPU单机或多机训练
# 特点: 每个进程拥有完整模型副本,梯度all-reduce同步
apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: "{{ job_name }}"
  namespace: "{{ namespace }}"
  labels:
    app: ai-training-platform
    training-job-id: "{{ job_id }}"
    sagemaker.ai/project-id: "{{ project_id }}"
    framework: pytorch
    job-type: "{{ job_type }}"
    distributed-strategy: ddp
    # Kueue优先级标签
    kueue.x-k8s.io/priority-class: "{{ priority | default('normal') }}"
  annotations:
    # Kueue Gang Scheduling队列
    kueue.x-k8s.io/queue-name: "{{ queue_name | default('default-queue') }}"
spec:
  # Gang Scheduling: 初始suspended,等待Kueue调度所有Pod
  runPolicy:
    suspend: {{ suspend | default(true) }}
    cleanPodPolicy: Running
  pytorchReplicaSpecs:
    # Master节点(Rank 0)
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app: ai-training-platform
            training-job-id: "{{ job_id }}"
            role: master
            distributed-strategy: ddp
        spec:
          containers:
            - name: pytorch
              image: "{{ docker_image }}"
              imagePullPolicy: IfNotPresent

              # Torchrun launcher命令
              command:
                - "torchrun"
                - "--nnodes={{ node_count }}"
                - "--nproc_per_node={{ gpu_per_node }}"
                - "--master_addr=$(MASTER_ADDR)"
                - "--master_port=$(MASTER_PORT)"
                - "--node_rank=0"
                {% if args %}
                {% for arg in args %}
                - "{{ arg }}"
                {% endfor %}
                {% endif %}

              # DDP环境变量
              env:
                # PyTorch分布式环境变量
                - name: RANK
                  value: "0"
                - name: LOCAL_RANK
                  value: "0"
                - name: WORLD_SIZE
                  value: "{{ world_size }}"
                - name: MASTER_ADDR
                  value: "{{ job_name }}-master-0"
                - name: MASTER_PORT
                  value: "23456"

                # NCCL通信优化
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_IB_DISABLE
                  value: "0"  # 启用InfiniBand(如果可用)
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
                - name: NCCL_MIN_NCHANNELS
                  value: "4"

                # PyTorch DDP优化
                - name: TORCH_DISTRIBUTED_DEBUG
                  value: "DETAIL"
                - name: CUDA_VISIBLE_DEVICES
                  value: "0,1,2,3,4,5,6,7"

                # 用户自定义环境变量
                {% for key, value in env_vars.items() %}
                - name: "{{ key }}"
                  value: "{{ value }}"
                {% endfor %}

              # 资源配置
              resources:
                limits:
                  nvidia.com/gpu: {{ gpu_per_node }}
                  memory: "{{ memory_per_node_gb }}Gi"
                  cpu: "{{ cpu_per_node }}"
                requests:
                  nvidia.com/gpu: {{ gpu_per_node }}
                  memory: "{{ memory_per_node_gb }}Gi"
                  cpu: "{{ cpu_per_node }}"

              # 存储挂载
              volumeMounts:
                {% if dataset_path %}
                - name: dataset
                  mountPath: /mnt/dataset
                  readOnly: true
                {% endif %}
                - name: output
                  mountPath: /mnt/output
                - name: checkpoint-local
                  mountPath: /mnt/nvme/checkpoints
                - name: checkpoint-fsx
                  mountPath: /mnt/fsx/checkpoints
                - name: shm
                  mountPath: /dev/shm

          # 存储卷
          volumes:
            {% if dataset_path %}
            - name: dataset
              persistentVolumeClaim:
                claimName: "{{ dataset_pvc }}"
            {% endif %}
            - name: output
              persistentVolumeClaim:
                claimName: "{{ output_pvc }}"
            - name: checkpoint-local
              hostPath:
                path: /mnt/nvme/checkpoints
                type: DirectoryOrCreate
            - name: checkpoint-fsx
              persistentVolumeClaim:
                claimName: fsx-checkpoints
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: 32Gi  # DDP需要大共享内存

          # 节点选择器
          {% if gpu_type %}
          nodeSelector:
            node.kubernetes.io/instance-type: "{{ gpu_type }}"
          {% endif %}

          # 容忍度配置
          tolerations:
            - key: "training"
              operator: "Equal"
              value: "true"
              effect: "NoSchedule"

    # Worker节点(Rank > 0)
    {% if node_count > 1 %}
    Worker:
      replicas: {{ node_count - 1 }}
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app: ai-training-platform
            training-job-id: "{{ job_id }}"
            role: worker
            distributed-strategy: ddp
        spec:
          containers:
            - name: pytorch
              image: "{{ docker_image }}"
              imagePullPolicy: IfNotPresent

              # Torchrun launcher命令(Worker使用node_rank > 0)
              command:
                - "torchrun"
                - "--nnodes={{ node_count }}"
                - "--nproc_per_node={{ gpu_per_node }}"
                - "--master_addr=$(MASTER_ADDR)"
                - "--master_port=$(MASTER_PORT)"
                - "--node_rank=$(POD_INDEX)"
                {% if args %}
                {% for arg in args %}
                - "{{ arg }}"
                {% endfor %}
                {% endif %}

              # DDP环境变量
              env:
                - name: POD_INDEX
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
                - name: WORLD_SIZE
                  value: "{{ world_size }}"
                - name: MASTER_ADDR
                  value: "{{ job_name }}-master-0"
                - name: MASTER_PORT
                  value: "23456"
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_IB_DISABLE
                  value: "0"
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
                - name: NCCL_MIN_NCHANNELS
                  value: "4"
                - name: TORCH_DISTRIBUTED_DEBUG
                  value: "DETAIL"
                - name: CUDA_VISIBLE_DEVICES
                  value: "0,1,2,3,4,5,6,7"
                {% for key, value in env_vars.items() %}
                - name: "{{ key }}"
                  value: "{{ value }}"
                {% endfor %}

              # 资源配置
              resources:
                limits:
                  nvidia.com/gpu: {{ gpu_per_node }}
                  memory: "{{ memory_per_node_gb }}Gi"
                  cpu: "{{ cpu_per_node }}"
                requests:
                  nvidia.com/gpu: {{ gpu_per_node }}
                  memory: "{{ memory_per_node_gb }}Gi"
                  cpu: "{{ cpu_per_node }}"

              # 存储挂载
              volumeMounts:
                {% if dataset_path %}
                - name: dataset
                  mountPath: /mnt/dataset
                  readOnly: true
                {% endif %}
                - name: output
                  mountPath: /mnt/output
                - name: checkpoint-local
                  mountPath: /mnt/nvme/checkpoints
                - name: checkpoint-fsx
                  mountPath: /mnt/fsx/checkpoints
                - name: shm
                  mountPath: /dev/shm

          # 存储卷
          volumes:
            {% if dataset_path %}
            - name: dataset
              persistentVolumeClaim:
                claimName: "{{ dataset_pvc }}"
            {% endif %}
            - name: output
              persistentVolumeClaim:
                claimName: "{{ output_pvc }}"
            - name: checkpoint-local
              hostPath:
                path: /mnt/nvme/checkpoints
                type: DirectoryOrCreate
            - name: checkpoint-fsx
              persistentVolumeClaim:
                claimName: fsx-checkpoints
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: 32Gi

          # 节点选择器
          {% if gpu_type %}
          nodeSelector:
            node.kubernetes.io/instance-type: "{{ gpu_type }}"
          {% endif %}

          # 容忍度配置
          tolerations:
            - key: "training"
              operator: "Equal"
              value: "true"
              effect: "NoSchedule"
    {% endif %}

  # 任务完成策略
  runPolicy:
    cleanPodPolicy: None
    {% if timeout_seconds %}
    activeDeadlineSeconds: {{ timeout_seconds }}
    {% endif %}
    backoffLimit: {{ max_retries }}
