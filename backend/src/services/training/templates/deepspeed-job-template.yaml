# DeepSpeed 训练模板
# 适用场景: 超大模型,需要ZeRO优化和混合精度
# 特点: ZeRO-1/2/3分阶段优化,支持offload到CPU/NVMe
apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: "{{ job_name }}"
  namespace: "{{ namespace }}"
  labels:
    app: ai-training-platform
    training-job-id: "{{ job_id }}"
    sagemaker.ai/project-id: "{{ project_id }}"
    framework: deepspeed
    job-type: "{{ job_type }}"
    distributed-strategy: deepspeed
    # Kueue优先级标签
    kueue.x-k8s.io/priority-class: "{{ priority | default('normal') }}"
  annotations:
    # Kueue Gang Scheduling队列
    kueue.x-k8s.io/queue-name: "{{ queue_name | default('default-queue') }}"
spec:
  # Gang Scheduling: 初始suspended,等待Kueue调度所有Pod
  runPolicy:
    suspend: {{ suspend | default(true) }}
    cleanPodPolicy: Running
  pytorchReplicaSpecs:
    # Master节点(Rank 0)
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app: ai-training-platform
            training-job-id: "{{ job_id }}"
            role: master
            distributed-strategy: deepspeed
        spec:
          containers:
            - name: pytorch
              image: "{{ docker_image }}"
              imagePullPolicy: IfNotPresent

              # DeepSpeed launcher命令
              command:
                - "deepspeed"
                - "--num_nodes={{ node_count }}"
                - "--num_gpus={{ gpu_per_node }}"
                - "--master_addr=$(MASTER_ADDR)"
                - "--master_port=$(MASTER_PORT)"
                - "--node_rank=0"
                {% if deepspeed_config_path %}
                - "--deepspeed_config={{ deepspeed_config_path }}"
                {% else %}
                - "--deepspeed_config=/mnt/config/deepspeed_config.json"
                {% endif %}
                {% if args %}
                {% for arg in args %}
                - "{{ arg }}"
                {% endfor %}
                {% endif %}

              # DeepSpeed环境变量
              env:
                # PyTorch分布式环境变量
                - name: RANK
                  value: "0"
                - name: LOCAL_RANK
                  value: "0"
                - name: WORLD_SIZE
                  value: "{{ world_size }}"
                - name: MASTER_ADDR
                  value: "{{ job_name }}-master-0"
                - name: MASTER_PORT
                  value: "23456"

                # DeepSpeed配置
                - name: DEEPSPEED_CONFIG
                  value: "{{ deepspeed_config_path | default('/mnt/config/deepspeed_config.json') }}"
                - name: ZERO_STAGE
                  value: "{{ zero_stage | default('2') }}"  # ZeRO-1/2/3
                - name: OFFLOAD_OPTIMIZER
                  value: "{{ offload_optimizer | default('False') }}"  # Offload到CPU
                - name: OFFLOAD_PARAM
                  value: "{{ offload_param | default('False') }}"  # Offload参数到CPU/NVMe
                - name: GRADIENT_ACCUMULATION_STEPS
                  value: "{{ gradient_accumulation_steps | default('1') }}"
                - name: GRADIENT_CLIPPING
                  value: "{{ gradient_clipping | default('1.0') }}"

                # 混合精度配置
                - name: FP16_ENABLED
                  value: "{{ fp16_enabled | default('False') }}"
                - name: BF16_ENABLED
                  value: "{{ bf16_enabled | default('True') }}"
                - name: LOSS_SCALE
                  value: "{{ loss_scale | default('0') }}"  # 0表示dynamic

                # NCCL通信优化
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_IB_DISABLE
                  value: "0"
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
                - name: NCCL_MIN_NCHANNELS
                  value: "8"
                - name: NCCL_P2P_DISABLE
                  value: "0"
                - name: NCCL_TREE_THRESHOLD
                  value: "0"

                # DeepSpeed优化
                - name: DS_ACCELERATOR
                  value: "cuda"
                - name: DS_BUILD_CPU_ADAM
                  value: "1"
                - name: DS_BUILD_FUSED_ADAM
                  value: "1"
                - name: DS_BUILD_FUSED_LAMB
                  value: "1"
                - name: DS_BUILD_UTILS
                  value: "1"

                # PyTorch优化
                - name: TORCH_DISTRIBUTED_DEBUG
                  value: "DETAIL"
                - name: CUDA_VISIBLE_DEVICES
                  value: "0,1,2,3,4,5,6,7"
                - name: PYTORCH_CUDA_ALLOC_CONF
                  value: "max_split_size_mb:512"

                # 用户自定义环境变量
                {% for key, value in env_vars.items() %}
                - name: "{{ key }}"
                  value: "{{ value }}"
                {% endfor %}

              # 资源配置(DeepSpeed需要大内存和高性能存储)
              resources:
                limits:
                  nvidia.com/gpu: {{ gpu_per_node }}
                  memory: "{{ memory_per_node_gb * 2 | int }}Gi"  # DeepSpeed需要更多内存
                  cpu: "{{ cpu_per_node * 1.5 | int }}"
                requests:
                  nvidia.com/gpu: {{ gpu_per_node }}
                  memory: "{{ memory_per_node_gb * 2 | int }}Gi"
                  cpu: "{{ cpu_per_node * 1.5 | int }}"

              # 存储挂载
              volumeMounts:
                {% if dataset_path %}
                - name: dataset
                  mountPath: /mnt/dataset
                  readOnly: true
                {% endif %}
                - name: output
                  mountPath: /mnt/output
                - name: checkpoint-local
                  mountPath: /mnt/nvme/checkpoints
                - name: checkpoint-fsx
                  mountPath: /mnt/fsx/checkpoints
                - name: deepspeed-config
                  mountPath: /mnt/config
                  readOnly: true
                - name: shm
                  mountPath: /dev/shm

          # 存储卷
          volumes:
            {% if dataset_path %}
            - name: dataset
              persistentVolumeClaim:
                claimName: "{{ dataset_pvc }}"
            {% endif %}
            - name: output
              persistentVolumeClaim:
                claimName: "{{ output_pvc }}"
            - name: checkpoint-local
              hostPath:
                path: /mnt/nvme/checkpoints
                type: DirectoryOrCreate
            - name: checkpoint-fsx
              persistentVolumeClaim:
                claimName: fsx-checkpoints
            - name: deepspeed-config
              configMap:
                name: "{{ job_name }}-deepspeed-config"
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: 64Gi

          # 节点选择器(DeepSpeed建议使用最高配置实例)
          {% if gpu_type %}
          nodeSelector:
            node.kubernetes.io/instance-type: "{{ gpu_type }}"
          {% else %}
          nodeSelector:
            node.kubernetes.io/instance-type: "p4d.24xlarge"
          {% endif %}

          # 容忍度配置
          tolerations:
            - key: "training"
              operator: "Equal"
              value: "true"
              effect: "NoSchedule"

    # Worker节点(Rank > 0)
    {% if node_count > 1 %}
    Worker:
      replicas: {{ node_count - 1 }}
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app: ai-training-platform
            training-job-id: "{{ job_id }}"
            role: worker
            distributed-strategy: deepspeed
        spec:
          containers:
            - name: pytorch
              image: "{{ docker_image }}"
              imagePullPolicy: IfNotPresent

              # DeepSpeed launcher命令
              command:
                - "deepspeed"
                - "--num_nodes={{ node_count }}"
                - "--num_gpus={{ gpu_per_node }}"
                - "--master_addr=$(MASTER_ADDR)"
                - "--master_port=$(MASTER_PORT)"
                - "--node_rank=$(POD_INDEX)"
                {% if deepspeed_config_path %}
                - "--deepspeed_config={{ deepspeed_config_path }}"
                {% else %}
                - "--deepspeed_config=/mnt/config/deepspeed_config.json"
                {% endif %}
                {% if args %}
                {% for arg in args %}
                - "{{ arg }}"
                {% endfor %}
                {% endif %}

              # DeepSpeed环境变量
              env:
                - name: POD_INDEX
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
                - name: WORLD_SIZE
                  value: "{{ world_size }}"
                - name: MASTER_ADDR
                  value: "{{ job_name }}-master-0"
                - name: MASTER_PORT
                  value: "23456"
                - name: DEEPSPEED_CONFIG
                  value: "{{ deepspeed_config_path | default('/mnt/config/deepspeed_config.json') }}"
                - name: ZERO_STAGE
                  value: "{{ zero_stage | default('2') }}"
                - name: OFFLOAD_OPTIMIZER
                  value: "{{ offload_optimizer | default('False') }}"
                - name: OFFLOAD_PARAM
                  value: "{{ offload_param | default('False') }}"
                - name: GRADIENT_ACCUMULATION_STEPS
                  value: "{{ gradient_accumulation_steps | default('1') }}"
                - name: GRADIENT_CLIPPING
                  value: "{{ gradient_clipping | default('1.0') }}"
                - name: FP16_ENABLED
                  value: "{{ fp16_enabled | default('False') }}"
                - name: BF16_ENABLED
                  value: "{{ bf16_enabled | default('True') }}"
                - name: LOSS_SCALE
                  value: "{{ loss_scale | default('0') }}"
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_IB_DISABLE
                  value: "0"
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
                - name: NCCL_MIN_NCHANNELS
                  value: "8"
                - name: NCCL_P2P_DISABLE
                  value: "0"
                - name: NCCL_TREE_THRESHOLD
                  value: "0"
                - name: DS_ACCELERATOR
                  value: "cuda"
                - name: DS_BUILD_CPU_ADAM
                  value: "1"
                - name: DS_BUILD_FUSED_ADAM
                  value: "1"
                - name: DS_BUILD_FUSED_LAMB
                  value: "1"
                - name: DS_BUILD_UTILS
                  value: "1"
                - name: TORCH_DISTRIBUTED_DEBUG
                  value: "DETAIL"
                - name: CUDA_VISIBLE_DEVICES
                  value: "0,1,2,3,4,5,6,7"
                - name: PYTORCH_CUDA_ALLOC_CONF
                  value: "max_split_size_mb:512"
                {% for key, value in env_vars.items() %}
                - name: "{{ key }}"
                  value: "{{ value }}"
                {% endfor %}

              # 资源配置
              resources:
                limits:
                  nvidia.com/gpu: {{ gpu_per_node }}
                  memory: "{{ memory_per_node_gb * 2 | int }}Gi"
                  cpu: "{{ cpu_per_node * 1.5 | int }}"
                requests:
                  nvidia.com/gpu: {{ gpu_per_node }}
                  memory: "{{ memory_per_node_gb * 2 | int }}Gi"
                  cpu: "{{ cpu_per_node * 1.5 | int }}"

              # 存储挂载
              volumeMounts:
                {% if dataset_path %}
                - name: dataset
                  mountPath: /mnt/dataset
                  readOnly: true
                {% endif %}
                - name: output
                  mountPath: /mnt/output
                - name: checkpoint-local
                  mountPath: /mnt/nvme/checkpoints
                - name: checkpoint-fsx
                  mountPath: /mnt/fsx/checkpoints
                - name: deepspeed-config
                  mountPath: /mnt/config
                  readOnly: true
                - name: shm
                  mountPath: /dev/shm

          # 存储卷
          volumes:
            {% if dataset_path %}
            - name: dataset
              persistentVolumeClaim:
                claimName: "{{ dataset_pvc }}"
            {% endif %}
            - name: output
              persistentVolumeClaim:
                claimName: "{{ output_pvc }}"
            - name: checkpoint-local
              hostPath:
                path: /mnt/nvme/checkpoints
                type: DirectoryOrCreate
            - name: checkpoint-fsx
              persistentVolumeClaim:
                claimName: fsx-checkpoints
            - name: deepspeed-config
              configMap:
                name: "{{ job_name }}-deepspeed-config"
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: 64Gi

          # 节点选择器
          {% if gpu_type %}
          nodeSelector:
            node.kubernetes.io/instance-type: "{{ gpu_type }}"
          {% else %}
          nodeSelector:
            node.kubernetes.io/instance-type: "p4d.24xlarge"
          {% endif %}

          # 容忍度配置
          tolerations:
            - key: "training"
              operator: "Equal"
              value: "true"
              effect: "NoSchedule"
    {% endif %}

  # 任务完成策略
  runPolicy:
    cleanPodPolicy: None
    {% if timeout_seconds %}
    activeDeadlineSeconds: {{ timeout_seconds }}
    {% endif %}
    backoffLimit: {{ max_retries }}

---
# DeepSpeed配置ConfigMap(默认配置)
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ job_name }}-deepspeed-config"
  namespace: "{{ namespace }}"
data:
  deepspeed_config.json: |
    {
      "train_batch_size": {{ train_batch_size | default(32) }},
      "train_micro_batch_size_per_gpu": {{ micro_batch_size | default(1) }},
      "gradient_accumulation_steps": {{ gradient_accumulation_steps | default(1) }},
      "gradient_clipping": {{ gradient_clipping | default(1.0) }},
      "steps_per_print": 10,
      "zero_optimization": {
        "stage": {{ zero_stage | default(2) }},
        "offload_optimizer": {
          "device": "{% if offload_optimizer == 'True' %}cpu{% else %}none{% endif %}"
        },
        "offload_param": {
          "device": "{% if offload_param == 'True' %}cpu{% else %}none{% endif %}"
        },
        "overlap_comm": true,
        "contiguous_gradients": true,
        "reduce_bucket_size": 5e8,
        "stage3_prefetch_bucket_size": 5e8,
        "stage3_param_persistence_threshold": 1e6
      },
      "fp16": {
        "enabled": {{ fp16_enabled | default('false') }},
        "loss_scale": {{ loss_scale | default(0) }},
        "loss_scale_window": 1000,
        "hysteresis": 2,
        "min_loss_scale": 1
      },
      "bf16": {
        "enabled": {{ bf16_enabled | default('true') }}
      },
      "optimizer": {
        "type": "AdamW",
        "params": {
          "lr": {{ learning_rate | default(3e-4) }},
          "betas": [0.9, 0.999],
          "eps": 1e-8,
          "weight_decay": 0.01
        }
      },
      "scheduler": {
        "type": "WarmupLR",
        "params": {
          "warmup_min_lr": 0,
          "warmup_max_lr": {{ learning_rate | default(3e-4) }},
          "warmup_num_steps": 1000
        }
      },
      "wall_clock_breakdown": false
    }
