# PyTorch FSDP (FullyShardedDataParallel) 训练模板
# 适用场景: 大模型(≥70B参数),需要模型参数分片
# 特点: 模型参数、梯度、优化器状态跨设备分片,支持CPU offload
apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: "{{ job_name }}"
  namespace: "{{ namespace }}"
  labels:
    app: ai-training-platform
    training-job-id: "{{ job_id }}"
    sagemaker.ai/project-id: "{{ project_id }}"
    framework: pytorch
    job-type: "{{ job_type }}"
    distributed-strategy: fsdp
    # Kueue优先级标签
    kueue.x-k8s.io/priority-class: "{{ priority | default('normal') }}"
  annotations:
    # Kueue Gang Scheduling队列
    kueue.x-k8s.io/queue-name: "{{ queue_name | default('default-queue') }}"
spec:
  # Gang Scheduling: 初始suspended,等待Kueue调度所有Pod
  runPolicy:
    suspend: {{ suspend | default(true) }}
    cleanPodPolicy: Running
  pytorchReplicaSpecs:
    # Master节点(Rank 0)
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app: ai-training-platform
            training-job-id: "{{ job_id }}"
            role: master
            distributed-strategy: fsdp
        spec:
          containers:
            - name: pytorch
              image: "{{ docker_image }}"
              imagePullPolicy: IfNotPresent

              # Torchrun launcher命令
              command:
                - "torchrun"
                - "--nnodes={{ node_count }}"
                - "--nproc_per_node={{ gpu_per_node }}"
                - "--master_addr=$(MASTER_ADDR)"
                - "--master_port=$(MASTER_PORT)"
                - "--node_rank=0"
                {% if args %}
                {% for arg in args %}
                - "{{ arg }}"
                {% endfor %}
                {% endif %}

              # FSDP环境变量
              env:
                # PyTorch分布式环境变量
                - name: RANK
                  value: "0"
                - name: LOCAL_RANK
                  value: "0"
                - name: WORLD_SIZE
                  value: "{{ world_size }}"
                - name: MASTER_ADDR
                  value: "{{ job_name }}-master-0"
                - name: MASTER_PORT
                  value: "23456"

                # FSDP配置
                - name: FSDP_SHARDING_STRATEGY
                  value: "{{ fsdp_sharding_strategy | default('FULL_SHARD') }}"  # FULL_SHARD/HYBRID_SHARD/SHARD_GRAD_OP
                - name: FSDP_CPU_OFFLOAD
                  value: "{{ fsdp_cpu_offload | default('False') }}"  # 是否offload到CPU
                - name: FSDP_BACKWARD_PREFETCH
                  value: "{{ fsdp_backward_prefetch | default('BACKWARD_PRE') }}"  # BACKWARD_PRE/BACKWARD_POST
                - name: FSDP_AUTO_WRAP_POLICY
                  value: "{{ fsdp_auto_wrap_policy | default('transformer') }}"  # transformer/size_based
                - name: FSDP_USE_ORIG_PARAMS
                  value: "{{ fsdp_use_orig_params | default('True') }}"
                - name: FSDP_SYNC_MODULE_STATES
                  value: "{{ fsdp_sync_module_states | default('True') }}"

                # 混合精度配置
                - name: FSDP_MIXED_PRECISION
                  value: "{{ fsdp_mixed_precision | default('bf16') }}"  # bf16/fp16
                - name: FSDP_ACTIVATION_CHECKPOINTING
                  value: "{{ fsdp_activation_checkpointing | default('True') }}"

                # NCCL通信优化(FSDP对通信带宽要求更高)
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_IB_DISABLE
                  value: "0"  # 必须启用InfiniBand/EFA
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
                - name: NCCL_MIN_NCHANNELS
                  value: "8"  # FSDP需要更多通道
                - name: NCCL_P2P_DISABLE
                  value: "0"  # 启用P2P传输
                - name: NCCL_TREE_THRESHOLD
                  value: "0"

                # PyTorch优化
                - name: TORCH_DISTRIBUTED_DEBUG
                  value: "DETAIL"
                - name: CUDA_VISIBLE_DEVICES
                  value: "0,1,2,3,4,5,6,7"
                - name: PYTORCH_CUDA_ALLOC_CONF
                  value: "max_split_size_mb:512"  # 减少内存碎片

                # 用户自定义环境变量
                {% for key, value in env_vars.items() %}
                - name: "{{ key }}"
                  value: "{{ value }}"
                {% endfor %}

              # 资源配置(FSDP需要更大内存)
              resources:
                limits:
                  nvidia.com/gpu: {{ gpu_per_node }}
                  memory: "{{ memory_per_node_gb * 1.5 | int }}Gi"  # FSDP需要额外内存
                  cpu: "{{ cpu_per_node }}"
                requests:
                  nvidia.com/gpu: {{ gpu_per_node }}
                  memory: "{{ memory_per_node_gb * 1.5 | int }}Gi"
                  cpu: "{{ cpu_per_node }}"

              # 存储挂载
              volumeMounts:
                {% if dataset_path %}
                - name: dataset
                  mountPath: /mnt/dataset
                  readOnly: true
                {% endif %}
                - name: output
                  mountPath: /mnt/output
                - name: checkpoint-local
                  mountPath: /mnt/nvme/checkpoints
                - name: checkpoint-fsx
                  mountPath: /mnt/fsx/checkpoints
                - name: shm
                  mountPath: /dev/shm

          # 存储卷
          volumes:
            {% if dataset_path %}
            - name: dataset
              persistentVolumeClaim:
                claimName: "{{ dataset_pvc }}"
            {% endif %}
            - name: output
              persistentVolumeClaim:
                claimName: "{{ output_pvc }}"
            - name: checkpoint-local
              hostPath:
                path: /mnt/nvme/checkpoints
                type: DirectoryOrCreate
            - name: checkpoint-fsx
              persistentVolumeClaim:
                claimName: fsx-checkpoints
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: 64Gi  # FSDP需要更大共享内存

          # 节点选择器(FSDP建议使用高带宽实例)
          {% if gpu_type %}
          nodeSelector:
            node.kubernetes.io/instance-type: "{{ gpu_type }}"
          {% else %}
          nodeSelector:
            node.kubernetes.io/instance-type: "p4d.24xlarge"  # 默认使用P4d(支持EFA)
          {% endif %}

          # 容忍度配置
          tolerations:
            - key: "training"
              operator: "Equal"
              value: "true"
              effect: "NoSchedule"

    # Worker节点(Rank > 0)
    {% if node_count > 1 %}
    Worker:
      replicas: {{ node_count - 1 }}
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app: ai-training-platform
            training-job-id: "{{ job_id }}"
            role: worker
            distributed-strategy: fsdp
        spec:
          containers:
            - name: pytorch
              image: "{{ docker_image }}"
              imagePullPolicy: IfNotPresent

              # Torchrun launcher命令
              command:
                - "torchrun"
                - "--nnodes={{ node_count }}"
                - "--nproc_per_node={{ gpu_per_node }}"
                - "--master_addr=$(MASTER_ADDR)"
                - "--master_port=$(MASTER_PORT)"
                - "--node_rank=$(POD_INDEX)"
                {% if args %}
                {% for arg in args %}
                - "{{ arg }}"
                {% endfor %}
                {% endif %}

              # FSDP环境变量
              env:
                - name: POD_INDEX
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
                - name: WORLD_SIZE
                  value: "{{ world_size }}"
                - name: MASTER_ADDR
                  value: "{{ job_name }}-master-0"
                - name: MASTER_PORT
                  value: "23456"
                - name: FSDP_SHARDING_STRATEGY
                  value: "{{ fsdp_sharding_strategy | default('FULL_SHARD') }}"
                - name: FSDP_CPU_OFFLOAD
                  value: "{{ fsdp_cpu_offload | default('False') }}"
                - name: FSDP_BACKWARD_PREFETCH
                  value: "{{ fsdp_backward_prefetch | default('BACKWARD_PRE') }}"
                - name: FSDP_AUTO_WRAP_POLICY
                  value: "{{ fsdp_auto_wrap_policy | default('transformer') }}"
                - name: FSDP_USE_ORIG_PARAMS
                  value: "{{ fsdp_use_orig_params | default('True') }}"
                - name: FSDP_SYNC_MODULE_STATES
                  value: "{{ fsdp_sync_module_states | default('True') }}"
                - name: FSDP_MIXED_PRECISION
                  value: "{{ fsdp_mixed_precision | default('bf16') }}"
                - name: FSDP_ACTIVATION_CHECKPOINTING
                  value: "{{ fsdp_activation_checkpointing | default('True') }}"
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_IB_DISABLE
                  value: "0"
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
                - name: NCCL_MIN_NCHANNELS
                  value: "8"
                - name: NCCL_P2P_DISABLE
                  value: "0"
                - name: NCCL_TREE_THRESHOLD
                  value: "0"
                - name: TORCH_DISTRIBUTED_DEBUG
                  value: "DETAIL"
                - name: CUDA_VISIBLE_DEVICES
                  value: "0,1,2,3,4,5,6,7"
                - name: PYTORCH_CUDA_ALLOC_CONF
                  value: "max_split_size_mb:512"
                {% for key, value in env_vars.items() %}
                - name: "{{ key }}"
                  value: "{{ value }}"
                {% endfor %}

              # 资源配置
              resources:
                limits:
                  nvidia.com/gpu: {{ gpu_per_node }}
                  memory: "{{ memory_per_node_gb * 1.5 | int }}Gi"
                  cpu: "{{ cpu_per_node }}"
                requests:
                  nvidia.com/gpu: {{ gpu_per_node }}
                  memory: "{{ memory_per_node_gb * 1.5 | int }}Gi"
                  cpu: "{{ cpu_per_node }}"

              # 存储挂载
              volumeMounts:
                {% if dataset_path %}
                - name: dataset
                  mountPath: /mnt/dataset
                  readOnly: true
                {% endif %}
                - name: output
                  mountPath: /mnt/output
                - name: checkpoint-local
                  mountPath: /mnt/nvme/checkpoints
                - name: checkpoint-fsx
                  mountPath: /mnt/fsx/checkpoints
                - name: shm
                  mountPath: /dev/shm

          # 存储卷
          volumes:
            {% if dataset_path %}
            - name: dataset
              persistentVolumeClaim:
                claimName: "{{ dataset_pvc }}"
            {% endif %}
            - name: output
              persistentVolumeClaim:
                claimName: "{{ output_pvc }}"
            - name: checkpoint-local
              hostPath:
                path: /mnt/nvme/checkpoints
                type: DirectoryOrCreate
            - name: checkpoint-fsx
              persistentVolumeClaim:
                claimName: fsx-checkpoints
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: 64Gi

          # 节点选择器
          {% if gpu_type %}
          nodeSelector:
            node.kubernetes.io/instance-type: "{{ gpu_type }}"
          {% else %}
          nodeSelector:
            node.kubernetes.io/instance-type: "p4d.24xlarge"
          {% endif %}

          # 容忍度配置
          tolerations:
            - key: "training"
              operator: "Equal"
              value: "true"
              effect: "NoSchedule"
    {% endif %}

  # 任务完成策略
  runPolicy:
    cleanPodPolicy: None
    {% if timeout_seconds %}
    activeDeadlineSeconds: {{ timeout_seconds }}
    {% endif %}
    backoffLimit: {{ max_retries }}
