[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "unit: Unit tests (no external dependencies)",
    "integration: Integration tests (may require external services)",
    "e2e: End-to-end tests (full application)",
    "aws_integration: Tests requiring real AWS credentials",
    "hyperpod: HyperPod-specific tests",
    "slow: Slow running tests",
    "performance: Performance and load tests",
    "architecture: Architecture compliance tests",
    "regression: Regression tests to ensure existing functionality",
]
# Default: exclude AWS integration, slow, and performance tests
addopts = "-m 'not aws_integration and not slow and not performance'"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::pytest.PytestDeprecationWarning",
]

[tool.black]
line-length = 120
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.venv
    | __pycache__
    | alembic/versions
)/
'''

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by black)
]

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
ignore_missing_imports = true

# AWS SDK 客户端 - 放宽 Any 返回值检查 (boto3/aioboto3 返回类型为 Any)
[[tool.mypy.overrides]]
module = [
    "src.shared.infrastructure.storage.s3_client",
    "src.modules.datasets.infrastructure.s3.*",
    "src.modules.datasets.infrastructure.fsx.*",
    "src.modules.training.infrastructure.hyperpod.*",
    "src.modules.monitoring.infrastructure.external.*",
]
warn_return_any = false

# 第三方库密码处理 - passlib 返回类型为 Any
[[tool.mypy.overrides]]
module = "src.shared.infrastructure.security.password"
warn_return_any = false

# 基础服务类 - 使用动态仓库方法
[[tool.mypy.overrides]]
module = "src.shared.application.enhanced_base_service"
warn_return_any = false

# 应用服务类 - 继承 EnhancedBaseService，使用动态仓库方法
[[tool.mypy.overrides]]
module = [
    "src.modules.training.application.services.*",
    "src.modules.datasets.application.services.*",
    "src.modules.models.application.services.*",
    "src.modules.quotas.application.services.*",
    "src.modules.spaces.application.services.*",
    "src.modules.auth.application.services.*",
]
warn_return_any = false
disable_error_code = ["attr-defined", "var-annotated"]

# 基础仓库类 - 泛型类型限制
[[tool.mypy.overrides]]
module = "src.shared.infrastructure.repository_base"
disable_error_code = ["attr-defined"]

# 仓库实现类 - 使用动态属性
[[tool.mypy.overrides]]
module = [
    "src.modules.*.infrastructure.repositories.*",
    "src.shared.application.enhanced_base_service",
    "src.shared.api.middleware.auth",
    "src.modules.quotas.api.resource_quota_endpoints",
]
disable_error_code = ["attr-defined"]
