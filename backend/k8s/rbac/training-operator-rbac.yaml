# RBAC配置 - 训练任务操作权限
# 为AI训练平台服务账号提供必要的K8s API权限
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-training-platform
  namespace: ai-platform
  labels:
    app: ai-training-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-training-platform-role
  namespace: ai-platform
  labels:
    app: ai-training-platform
rules:
  # PyTorchJob资源权限
  - apiGroups: ["kubeflow.org"]
    resources: ["pytorchjobs"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  - apiGroups: ["kubeflow.org"]
    resources: ["pytorchjobs/status"]
    verbs: ["get", "update", "patch"]

  # Job资源权限
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  - apiGroups: ["batch"]
    resources: ["jobs/status"]
    verbs: ["get"]

  # Pod资源权限(用于日志和状态查询)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get"]

  # Service资源权限(用于分布式训练通信)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "watch", "delete"]

  # ConfigMap资源权限(用于配置管理)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  # PVC资源权限(用于存储管理)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]

  # Event资源权限(用于事件监听)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-training-platform-rolebinding
  namespace: ai-platform
  labels:
    app: ai-training-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ai-training-platform-role
subjects:
  - kind: ServiceAccount
    name: ai-training-platform
    namespace: ai-platform
---
# ClusterRole - 跨命名空间查询权限(如果需要)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-training-platform-cluster-role
  labels:
    app: ai-training-platform
rules:
  # 读取节点信息(用于资源调度决策)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]

  # 读取命名空间信息
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]

  # 读取StorageClass信息(用于存储管理)
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-training-platform-cluster-rolebinding
  labels:
    app: ai-training-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-training-platform-cluster-role
subjects:
  - kind: ServiceAccount
    name: ai-training-platform
    namespace: ai-platform
