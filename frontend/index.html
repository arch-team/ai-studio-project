    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07211E" />
    <meta name="description" content="企业级分布式 AI 训练平台 — 基于 AWS SageMaker HyperPod" />
    <title>AI 训练平台</title>
    <style>
      /* 首屏加载骨架（React 挂载前），避免白屏闪烁。
         仅作用于 #root 为空时的引导阶段，应用渲染后即被替换。 */
      html,
      body {
        margin: 0;
        padding: 0;
      }
      #root:empty {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse 60% 90% at 82% -12%, rgba(66, 224, 204, 0.18), transparent 60%),
          linear-gradient(132deg, #02110f 0%, #07211e 52%, #0b3b35 100%);
      }
      #root:empty::before {
        content: "";
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 3px solid rgba(82, 227, 210, 0.25);
        border-top-color: #52e3d2;
        animation: boot-spin 0.9s linear infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #root:empty::before {
          animation-duration: 2.4s;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
