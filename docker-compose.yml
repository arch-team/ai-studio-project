version: '3.8'

services:
  # MySQL 8.0 数据库服务 (开发环境)
  mysql:
    image: mysql:8.0.28
    container_name: ai-training-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-devpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_training}
      MYSQL_USER: ${MYSQL_USER:-ai_training}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ai_training_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-devpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-training-network

  # FastAPI 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-training-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=mysql+aiomysql://${MYSQL_USER:-ai_training}:${MYSQL_PASSWORD:-ai_training_pass}@mysql:3306/${MYSQL_DATABASE:-ai_training}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - HYPERPOD_CLUSTER_ARN=${HYPERPOD_CLUSTER_ARN:-}
      - DEBUG=${DEBUG:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ai-training-network

  # Vite + React 前端服务 (开发模式)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: ai-training-frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - ai-training-network

volumes:
  mysql_data:
    driver: local

networks:
  ai-training-network:
    driver: bridge
