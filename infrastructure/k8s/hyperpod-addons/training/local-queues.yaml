# Local Queues for Kueue
# Namespace-scoped queues that route workloads to ClusterQueues
# Reference: https://kueue.sigs.k8s.io/docs/concepts/local_queue/
---
# Default namespace for training workloads
apiVersion: v1
kind: Namespace
metadata:
  name: training-jobs
  labels:
    app.kubernetes.io/name: training-jobs
    platform.ai/component: training
    platform.ai/priority-access: "false"

---
# High-priority training namespace
apiVersion: v1
kind: Namespace
metadata:
  name: training-priority
  labels:
    app.kubernetes.io/name: training-priority
    platform.ai/component: training
    platform.ai/priority-access: "true"

---
# Local Queue for standard training workloads
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: default-training-queue
  namespace: training-jobs
  labels:
    app.kubernetes.io/name: kueue
    app.kubernetes.io/component: local-queue
    platform.ai/queue-type: training
spec:
  # Route to the main GPU training cluster queue
  clusterQueue: gpu-training-queue

---
# Local Queue for high-priority training workloads
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: priority-training-queue
  namespace: training-priority
  labels:
    app.kubernetes.io/name: kueue
    app.kubernetes.io/component: local-queue
    platform.ai/queue-type: high-priority
spec:
  clusterQueue: high-priority-training-queue

---
# Local Queue for preprocessing in training namespace
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: preprocessing-queue
  namespace: training-jobs
  labels:
    app.kubernetes.io/name: kueue
    app.kubernetes.io/component: local-queue
    platform.ai/queue-type: preprocessing
spec:
  clusterQueue: preprocessing-queue

# Note: PriorityClass configuration is automatically provided by the
# SageMaker HyperPod Task Governance add-on (amazon-sagemaker-hyperpod-task-governance).
# No manual PriorityClass creation is needed.
#
# Task Governance automatically configures PriorityClass resources per spec.md FR-004.
# Reference: https://docs.aws.amazon.com/sagemaker/latest/dg/sagemaker-hyperpod-task-governance.html
