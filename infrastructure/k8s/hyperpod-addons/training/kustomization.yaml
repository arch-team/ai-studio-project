# Kustomization for HyperPod Training Add-ons
# This kustomization manages Training Operator and Kueue components
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: hyperpod-training-addons
  annotations:
    description: "HyperPod Training Add-ons including Training Operator and Kueue"

resources:
  # Kueue configuration
  - kueue-config.yaml
  # Training Operator configuration
  - training-operator-config.yaml
  # Resource Flavors for GPU types
  - resource-flavors.yaml
  # Cluster Queues for workload management
  - cluster-queues.yaml
  # Local Queues for namespace-level scheduling
  - local-queues.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: ai-training-platform
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
