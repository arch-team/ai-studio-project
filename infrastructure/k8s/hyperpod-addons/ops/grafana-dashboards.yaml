# Grafana Dashboard ConfigMaps for AI Training Platform
# These dashboards provide visibility into GPU utilization, training jobs, and cluster health
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-gpu-overview
  namespace: hyperpod-monitoring
  labels:
    app.kubernetes.io/name: grafana
    grafana_dashboard: "1"
data:
  gpu-overview.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "GPU Utilization Overview",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "avg(DCGM_FI_DEV_GPU_UTIL) by (node)",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  { "color": "red", "value": 0 },
                  { "color": "yellow", "value": 50 },
                  { "color": "green", "value": 70 }
                ]
              }
            }
          }
        },
        {
          "title": "GPU Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_FB_USED / DCGM_FI_DEV_FB_TOTAL * 100",
              "legendFormat": "{{node}} GPU {{gpu}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100
            }
          }
        },
        {
          "title": "GPU Temperature",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "avg(DCGM_FI_DEV_GPU_TEMP) by (node)",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "yellow", "value": 70 },
                  { "color": "orange", "value": 80 },
                  { "color": "red", "value": 85 }
                ]
              }
            }
          }
        },
        {
          "title": "GPU Power Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE",
              "legendFormat": "{{node}} GPU {{gpu}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "watt"
            }
          }
        },
        {
          "title": "ECC Errors",
          "type": "stat",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "targets": [
            {
              "expr": "sum(DCGM_FI_DEV_ECC_SBE_VOL_TOTAL + DCGM_FI_DEV_ECC_DBE_VOL_TOTAL) by (node)",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 50 }
                ]
              }
            }
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["gpu", "nvidia", "training"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "title": "GPU Overview Dashboard",
      "uid": "gpu-overview"
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-training-jobs
  namespace: hyperpod-monitoring
  labels:
    app.kubernetes.io/name: grafana
    grafana_dashboard: "1"
data:
  training-jobs.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "panels": [
        {
          "title": "Active Training Jobs",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "count(kube_pod_labels{label_platform_ai_job_type=\"distributed-training\", pod=~\".*-master-.*\"} * on(pod) group_left() kube_pod_status_phase{phase=\"Running\"})",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Pending Workloads (Kueue)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "sum(kueue_pending_workloads)",
              "refId": "A"
            }
          ]
        },
        {
          "title": "GPU Allocation",
          "type": "piechart",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{resource=\"nvidia_com_gpu\"}) by (namespace)",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Queue Wait Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(kueue_admission_wait_time_seconds_bucket[5m])) by (le, cluster_queue))",
              "legendFormat": "{{cluster_queue}} (p95)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          }
        },
        {
          "title": "Job Completion Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(kube_job_status_succeeded[1h])) by (namespace)",
              "legendFormat": "{{namespace}} - Success",
              "refId": "A"
            },
            {
              "expr": "sum(rate(kube_job_status_failed[1h])) by (namespace)",
              "legendFormat": "{{namespace}} - Failed",
              "refId": "B"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["training", "jobs", "kueue"],
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "title": "Training Jobs Dashboard",
      "uid": "training-jobs"
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster-health
  namespace: hyperpod-monitoring
  labels:
    app.kubernetes.io/name: grafana
    grafana_dashboard: "1"
data:
  cluster-health.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "panels": [
        {
          "title": "Node Status",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "count(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "legendFormat": "Ready",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "red", "value": 0 },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "title": "GPU Nodes",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 0 },
          "targets": [
            {
              "expr": "count(kube_node_labels{label_nvidia_com_gpu=\"true\"})",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Node Recovery Events",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 0 },
          "targets": [
            {
              "expr": "sum(increase(hyperpod_node_recovery_total[24h]))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          }
        },
        {
          "title": "Cluster CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\"}[5m])) by (node)",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Cluster Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{container!=\"\"}) by (node) / sum(machine_memory_bytes) by (node) * 100",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100
            }
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["cluster", "health", "nodes"],
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "title": "Cluster Health Dashboard",
      "uid": "cluster-health"
    }
