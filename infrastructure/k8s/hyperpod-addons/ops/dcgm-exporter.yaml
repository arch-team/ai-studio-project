# DCGM Exporter for NVIDIA GPU Metrics
# Exposes GPU metrics to Prometheus for monitoring
# Reference: https://github.com/NVIDIA/dcgm-exporter
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dcgm-exporter-metrics
  namespace: hyperpod-monitoring
  labels:
    app.kubernetes.io/name: dcgm-exporter
data:
  # Custom metrics to collect
  counters.csv: |
    # Format: <metric_name>, <metric_description>
    # GPU Utilization Metrics
    DCGM_FI_DEV_GPU_UTIL, GPU utilization
    DCGM_FI_DEV_MEM_COPY_UTIL, Memory copy utilization
    DCGM_FI_DEV_ENC_UTIL, Encoder utilization
    DCGM_FI_DEV_DEC_UTIL, Decoder utilization

    # Memory Metrics
    DCGM_FI_DEV_FB_FREE, Free framebuffer memory
    DCGM_FI_DEV_FB_USED, Used framebuffer memory
    DCGM_FI_DEV_FB_TOTAL, Total framebuffer memory

    # Temperature and Power
    DCGM_FI_DEV_GPU_TEMP, GPU temperature
    DCGM_FI_DEV_MEMORY_TEMP, Memory temperature
    DCGM_FI_DEV_POWER_USAGE, Power usage

    # Performance Metrics
    DCGM_FI_DEV_SM_CLOCK, SM clock frequency
    DCGM_FI_DEV_MEM_CLOCK, Memory clock frequency
    DCGM_FI_DEV_PCIE_TX_THROUGHPUT, PCIe TX throughput
    DCGM_FI_DEV_PCIE_RX_THROUGHPUT, PCIe RX throughput

    # NVLink Metrics (for multi-GPU)
    DCGM_FI_DEV_NVLINK_BANDWIDTH_TOTAL, Total NVLink bandwidth

    # Tensor Core Metrics
    DCGM_FI_DEV_TENSOR_ACTIVE, Tensor Core active cycles
    DCGM_FI_PROF_GR_ENGINE_ACTIVE, Graphics engine active

    # Error Metrics
    DCGM_FI_DEV_ECC_SBE_VOL_TOTAL, Total single-bit ECC errors
    DCGM_FI_DEV_ECC_DBE_VOL_TOTAL, Total double-bit ECC errors
    DCGM_FI_DEV_RETIRED_SBE, Retired pages due to single-bit errors
    DCGM_FI_DEV_RETIRED_DBE, Retired pages due to double-bit errors

    # XID Errors
    DCGM_FI_DEV_XID_ERRORS, XID errors

---
# DaemonSet for DCGM Exporter
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-exporter
  namespace: hyperpod-monitoring
  labels:
    app.kubernetes.io/name: dcgm-exporter
    app.kubernetes.io/component: gpu-monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dcgm-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dcgm-exporter
        app.kubernetes.io/component: gpu-monitoring
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9400"
    spec:
      serviceAccountName: prometheus
      # Only run on GPU nodes
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: dcgm-exporter
          image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.1-ubuntu22.04
          imagePullPolicy: IfNotPresent
          args:
            - "-f"
            - "/etc/dcgm-exporter/counters.csv"
            - "--kubernetes"
            - "--collectors"
            - "101"  # Enable all GPU metrics
          ports:
            - name: metrics
              containerPort: 9400
          env:
            - name: DCGM_EXPORTER_LISTEN
              value: ":9400"
            - name: DCGM_EXPORTER_KUBERNETES
              value: "true"
            - name: DCGM_EXPORTER_KUBERNETES_GPU_ID_TYPE
              value: "uid"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: counters
              mountPath: /etc/dcgm-exporter
              readOnly: true
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            capabilities:
              add: ["SYS_ADMIN"]
      volumes:
        - name: counters
          configMap:
            name: dcgm-exporter-metrics

---
# Service for DCGM Exporter
apiVersion: v1
kind: Service
metadata:
  name: dcgm-exporter
  namespace: hyperpod-monitoring
  labels:
    app.kubernetes.io/name: dcgm-exporter
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9400
      targetPort: 9400
  selector:
    app.kubernetes.io/name: dcgm-exporter

---
# ServiceMonitor for Prometheus Operator (if using)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dcgm-exporter
  namespace: hyperpod-monitoring
  labels:
    app.kubernetes.io/name: dcgm-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dcgm-exporter
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
