# Alertmanager Secret - 敏感信息模板
# 部署前必须替换占位符为实际值
# 注意: 此文件不应提交到版本控制中，仅作为模板使用
---
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secrets
  namespace: hyperpod-monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: alerting
type: Opaque
stringData:
  # Slack webhook URL - 替换为实际的 Incoming Webhook URL
  # 获取方式: Slack App > Incoming Webhooks > Add New Webhook to Workspace
  slack-webhook-url: "REPLACE_WITH_ACTUAL_WEBHOOK_URL"
