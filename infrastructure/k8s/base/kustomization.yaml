# Kustomize Base - AI Training Platform K8s Resources
# 聚合所有环境共享的基础配置
#
# 注意: Kustomize 安全限制要求所有资源必须在 base 目录下。
# 各子目录使用 Kustomize 组件模式，通过 overlay 显式引用。
# 独立 YAML 文件直接放在 base/ 内。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # RBAC
  - cluster-roles.yaml
  - training-job-role.yaml
  # Security
  - namespace-psa-labels.yaml
  # Storage
  - fsx-storage-class.yaml
  # Application
  - application/
