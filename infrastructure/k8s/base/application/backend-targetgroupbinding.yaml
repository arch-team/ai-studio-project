# 后端 ALB TargetGroupBinding
# 将 AWS ALB Target Group 绑定到 K8s Service (通过 AWS Load Balancer Controller)
apiVersion: elbv2.k8s.aws/v1beta1
kind: TargetGroupBinding
metadata:
  name: backend-tgb
  namespace: ai-platform
spec:
  serviceRef:
    name: backend-svc
    port: 8000
  targetGroupARN: "arn:aws:elasticloadbalancing:us-east-1:897473508751:targetgroup/ai-platform-dev-api/b20b338b9ba0a420"
  targetType: ip
  networking:
    ingress:
      - from:
          - securityGroup:
              groupID: sg-05c1520322739b62a
        ports:
          - port: 8000
            protocol: TCP
