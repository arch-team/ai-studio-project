# 前端服务 Deployment
# React 应用通过 nginx 提供静态资源服务
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 897473508751.dkr.ecr.us-east-1.amazonaws.com/ai-platform-dev-frontend:v1.0.17
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            # runAsNonRoot 设为 false: nginx 需要 root 权限
            runAsNonRoot: false
