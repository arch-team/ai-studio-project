# 前端服务配置 (运行时环境变量)
# 构建时注入到 nginx 配置中，或通过 window.__ENV__ 注入到 React 应用
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: ai-platform
data:
  # API 后端地址 (集群内部通信)
  API_BASE_URL: "http://backend-svc:8000"
  # 公网 API 地址 (前端 JavaScript 使用)
  PUBLIC_API_URL: "/api"
  # 环境标识
  ENVIRONMENT: "development"
  # 功能开关
  ENABLE_MONITORING: "true"
  ENABLE_SPACES: "false"
