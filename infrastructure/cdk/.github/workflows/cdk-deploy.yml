# =============================================================================
# CDK Deploy Pipeline - Infrastructure Deployment
# =============================================================================
# This workflow deploys CDK stacks to AWS environments.
#
# Deployment Strategy:
# - dev: Automatic deployment on main branch push
# - staging: Manual trigger with approval
# - prod: Manual trigger with approval (requires staging success)
#
# Prerequisites:
# 1. Configure AWS credentials in GitHub Secrets:
#    - AWS_ACCESS_KEY_ID
#    - AWS_SECRET_ACCESS_KEY
#    - AWS_ACCOUNT_ID
# 2. For staging/prod, configure Environment protection rules in GitHub
# =============================================================================

name: CDK Deploy

on:
  # Automatic deployment to dev on main push
  push:
    branches: [main]
    paths:
      - 'infrastructure/cdk/**'

  # Manual deployment trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: 'dev'
      stacks:
        description: 'Stacks to deploy (comma-separated, or "all")'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry run (synth only, no deploy)'
        required: false
        type: boolean
        default: false

env:
  WORKING_DIRECTORY: infrastructure/cdk
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  AWS_REGION: us-east-1

jobs:
  # ===========================================================================
  # Prepare: Determine deployment parameters
  # ===========================================================================
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      stacks: ${{ steps.set-env.outputs.stacks }}
      dry_run: ${{ steps.set-env.outputs.dry_run }}

    steps:
      - name: Set deployment parameters
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "stacks=${{ github.event.inputs.stacks }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
          else
            # Automatic deployment to dev on push
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "stacks=all" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Deploy: CDK Deployment
  # ===========================================================================
  deploy:
    name: Deploy to ${{ needs.prepare.outputs.environment }}
    runs-on: ubuntu-latest
    needs: prepare
    environment: ${{ needs.prepare.outputs.environment }}
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Bootstrap (if needed)
        run: |
          cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }} \
            --context env=${{ needs.prepare.outputs.environment }} \
            || echo "Bootstrap already done or failed (continuing...)"
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: CDK Synth
        run: |
          echo "## CDK Synth Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cdk synth --context env=${{ needs.prepare.outputs.environment }} --quiet
          echo "✅ Synthesis successful for **${{ needs.prepare.outputs.environment }}** environment" >> $GITHUB_STEP_SUMMARY
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: CDK Diff
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Infrastructure Changes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          cdk diff --context env=${{ needs.prepare.outputs.environment }} 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: CDK Deploy
        if: needs.prepare.outputs.dry_run != 'true'
        run: |
          STACKS="${{ needs.prepare.outputs.stacks }}"

          if [ "$STACKS" == "all" ]; then
            STACK_ARGS="--all"
          else
            # Convert comma-separated list to space-separated
            STACK_ARGS=$(echo "$STACKS" | tr ',' ' ')
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deployment Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          cdk deploy $STACK_ARGS \
            --context env=${{ needs.prepare.outputs.environment }} \
            --require-approval never \
            --outputs-file outputs.json \
            2>&1 | tee deploy-output.txt

          if [ $? -eq 0 ]; then
            echo "✅ Deployment successful!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Deployment failed!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stack Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat outputs.json >> $GITHUB_STEP_SUMMARY || echo "No outputs available"
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Dry Run Notice
        if: needs.prepare.outputs.dry_run == 'true'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Dry Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ This was a **dry run**. No resources were deployed." >> $GITHUB_STEP_SUMMARY
          echo "To deploy, run again without the dry run option." >> $GITHUB_STEP_SUMMARY

      - name: Upload deployment outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deployment-outputs-${{ needs.prepare.outputs.environment }}
          path: |
            ${{ env.WORKING_DIRECTORY }}/outputs.json
            ${{ env.WORKING_DIRECTORY }}/deploy-output.txt
          retention-days: 30

  # ===========================================================================
  # Notify: Deployment notification (optional)
  # ===========================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [prepare, deploy]
    if: always()

    steps:
      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ needs.prepare.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Stacks | ${{ needs.prepare.outputs.stacks }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | ${{ needs.prepare.outputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

      # Optional: Add Slack/Teams notification here
      # - name: Notify Slack
      #   if: failure()
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     payload: |
      #       {
      #         "text": "CDK deployment to ${{ needs.prepare.outputs.environment }} ${{ needs.deploy.result }}"
      #       }
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
